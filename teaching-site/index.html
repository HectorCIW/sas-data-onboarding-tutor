<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAS Data Onboarding Tutor</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f4f6f8;
      --surface: #ffffff;
      --ink: #17202a;
      --muted: #5d6875;
      --line: #d8dde5;
      --accent: #1f6f8b;
      --accent-soft: #e5f3f7;
      --green: #146c43;
      --green-soft: #e7f4ed;
      --amber: #936000;
      --amber-soft: #fff2cd;
      --red: #b42318;
      --red-soft: #fde8e7;
      --code: #111827;
      --code-bg: #f0f3f6;
      --shadow: 0 1px 2px rgba(16, 24, 40, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--ink);
      line-height: 1.5;
    }

    button,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a.button {
      text-decoration: none;
    }

    code,
    pre,
    textarea {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: .9rem;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .button {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 7px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .button.secondary {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .button:focus-visible,
    a.button:focus-visible,
    .module-button:focus-visible,
    .choice:focus-visible,
    .chip:focus-visible {
      outline: 3px solid rgba(31, 111, 139, .25);
      outline-offset: 2px;
    }

    .workspace {
      width: min(1680px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
    }

    .sidebar,
    .lesson {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .sidebar {
      align-self: start;
    }

    .section-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .section-head h2 {
      margin: 0;
      font-size: .98rem;
      letter-spacing: 0;
    }

    .section-head p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: .88rem;
    }

    .module-list {
      display: grid;
      gap: 8px;
      padding: 12px;
    }

    .module-button {
      width: 100%;
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 58px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #ffffff;
      text-align: left;
      color: var(--ink);
    }

    .module-button[aria-current="true"] {
      border-color: rgba(31, 111, 139, .45);
      background: var(--accent-soft);
    }

    .step-index {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--code-bg);
      font-weight: 800;
      color: var(--muted);
    }

    .module-button[aria-current="true"] .step-index {
      background: var(--accent);
      color: #ffffff;
    }

    .module-title {
      display: block;
      font-weight: 800;
      line-height: 1.25;
    }

    .module-subtitle {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.25;
    }

    .lesson {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .lesson-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 12px;
    }

    .lesson-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .lesson-title-row h2 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0;
    }

    .lesson-title-row p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .pill {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 26px;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-weight: 800;
      font-size: .82rem;
      white-space: nowrap;
    }

    .source-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      font-weight: 700;
    }

    .chip[aria-pressed="true"] {
      border-color: rgba(31, 111, 139, .55);
      background: var(--accent);
      color: #ffffff;
    }

    .lesson-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(380px, .95fr);
      gap: 14px;
      padding: 14px;
      align-items: start;
    }

    .left-stack {
      min-width: 0;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      min-width: 0;
    }

    .panel h3 {
      margin: 0;
      padding: 12px 13px;
      border-bottom: 1px solid var(--line);
      font-size: .98rem;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 13px;
      overflow-x: hidden;
    }

    .mini-table {
      width: 100%;
      min-width: 0;
      table-layout: fixed;
      border-collapse: collapse;
      font-size: .8rem;
    }

    .mini-table th,
    .mini-table td {
      padding: 7px 6px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .mini-table th {
      background: #f8fafc;
      color: var(--muted);
      font-weight: 800;
    }

    .profile-bars {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(132px, 158px));
      justify-content: start;
      gap: 6px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 1fr;
      align-content: center;
      gap: 2px;
      min-height: 46px;
      padding: 6px 7px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfcfd;
      font-size: .78rem;
      overflow: hidden;
    }

    .bar-row span,
    .bar-row strong {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .bar-row strong {
      color: var(--accent);
      font-size: .73rem;
      line-height: 1.25;
      text-align: left;
    }

    .code-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 13px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .code-editor {
      width: 100%;
      min-height: 420px;
      resize: vertical;
      border: 0;
      padding: 14px;
      background: var(--code-bg);
      color: var(--code);
      line-height: 1.45;
      font-size: .9rem;
      outline: 0;
    }

    .run-output {
      border-top: 1px solid var(--line);
      background: #ffffff;
    }

    .run-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px 13px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: .84rem;
      font-weight: 700;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--code-bg);
      color: var(--muted);
      font-weight: 800;
    }

    .status-pill.ok {
      background: var(--green-soft);
      color: var(--green);
    }

    .status-pill.warn {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .status-pill.fail {
      background: var(--red-soft);
      color: var(--red);
    }

    .result-grid {
      display: grid;
      grid-template-columns: minmax(0, .95fr) minmax(0, 1.05fr);
      gap: 0;
    }

    .result-pane {
      min-width: 0;
      padding: 13px;
    }

    .result-pane + .result-pane {
      border-left: 1px solid var(--line);
    }

    .result-pane h4 {
      margin: 0 0 8px;
      font-size: .9rem;
      letter-spacing: 0;
    }

    .log-lines {
      min-height: 112px;
      margin: 0;
      padding: 10px;
      border-radius: 7px;
      background: var(--code-bg);
      color: var(--code);
      overflow: auto;
      white-space: pre-wrap;
      font-size: .82rem;
      line-height: 1.42;
    }

    .output-table-wrap {
      overflow-x: auto;
    }

    .output-table {
      width: 100%;
      min-width: 460px;
      border-collapse: collapse;
      font-size: .84rem;
    }

    .output-table th,
    .output-table td {
      padding: 7px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    .output-table th {
      background: #f8fafc;
      color: var(--muted);
      font-weight: 800;
    }

    .quiz-list,
    .checklist,
    .text-list,
    .reference-list {
      display: grid;
      gap: 8px;
    }

    .choice {
      width: 100%;
      min-height: 42px;
      padding: 9px 10px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      text-align: left;
    }

    .choice.correct {
      border-color: rgba(20, 108, 67, .55);
      background: var(--green-soft);
    }

    .choice.incorrect {
      border-color: rgba(180, 35, 24, .55);
      background: var(--red-soft);
    }

    .feedback {
      min-height: 24px;
      margin-top: 10px;
      color: var(--muted);
      font-weight: 700;
    }

    .lesson-notes {
      display: grid;
      gap: 12px;
    }

    .study-bridge {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 10px;
      border: 1px solid #bfd7df;
      border-radius: 8px;
      background: #f3f9fb;
    }

    .bridge-card {
      min-width: 0;
      padding: 10px;
      border: 1px solid rgba(31, 111, 139, .18);
      border-radius: 7px;
      background: #ffffff;
    }

    .bridge-card span {
      display: block;
      margin-bottom: 5px;
      color: var(--accent);
      font-size: .76rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .bridge-card p {
      margin: 0;
      color: var(--ink);
      font-size: .86rem;
      line-height: 1.45;
    }

    .note-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .note-box {
      min-height: 96px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .note-box strong {
      display: block;
      margin-bottom: 5px;
      font-size: .9rem;
    }

    .note-box p {
      margin: 0;
      color: var(--muted);
      font-size: .86rem;
    }

    .text-list {
      margin: 0;
      padding-left: 20px;
    }

    .text-list li {
      padding-left: 2px;
    }

    .reference-list a {
      display: block;
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    @media (max-width: 1780px) {
      .workspace {
        grid-template-columns: 300px minmax(0, 1fr);
      }

      .lesson-body {
        grid-template-columns: 1fr;
      }
    }

    .question-card {
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .question-card p {
      margin: 0 0 8px;
      font-weight: 800;
    }

    .quiz-score {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 800;
      font-size: .9rem;
    }

    .check-item {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
    }

    .check-item:last-child {
      border-bottom: 0;
    }

    .check-dot {
      width: 20px;
      height: 20px;
      margin-top: 1px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: .78rem;
      font-weight: 900;
    }

    .evidence-section {
      padding: 13px;
      border-bottom: 1px solid var(--line);
    }

    .evidence-section:last-child {
      border-bottom: 0;
    }

    .evidence-section h3 {
      margin: 0 0 10px;
      font-size: .95rem;
      letter-spacing: 0;
    }

    .command-list {
      display: grid;
      gap: 8px;
    }

    .command-list code {
      display: block;
      padding: 9px;
      border-radius: 7px;
      background: var(--code-bg);
      color: var(--code);
      overflow-wrap: anywhere;
      font-size: .8rem;
    }

    .small-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: .84rem;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 1180px) {
      .workspace {
        grid-template-columns: 240px minmax(0, 1fr);
      }

    }

    @media (max-width: 840px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .lesson-body {
        grid-template-columns: 1fr;
      }

      .result-grid {
        grid-template-columns: 1fr;
      }

      .study-bridge,
      .note-grid {
        grid-template-columns: 1fr;
      }

      .result-pane + .result-pane {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">SAS</div>
        <div>
          <h1>SAS Data Onboarding Tutor</h1>
          <p>從資料入口練到可驗證的 SAS workflow</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="button secondary" id="reset-progress" type="button">重置練習</button>
        <a class="button secondary" href="quiz.html">課程測驗</a>
        <button class="button" id="copy-code" type="button">複製程式</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar" aria-label="課程模組">
        <div class="section-head">
          <h2>課程路徑</h2>
          <p id="progress-label">0 / 5 完成</p>
        </div>
        <nav class="module-list" id="module-list"></nav>
      </aside>

      <section class="lesson" aria-label="教學工作區">
        <div class="lesson-head">
          <div class="lesson-title-row">
            <div>
              <h2 id="lesson-title"></h2>
              <p id="lesson-objective"></p>
            </div>
            <span class="pill" id="source-pill">dataset</span>
          </div>
          <div class="source-switcher" aria-label="資料入口">
            <button class="chip" type="button" data-source="dataset" aria-pressed="true">Dataset</button>
            <button class="chip" type="button" data-source="spec" aria-pressed="false">Spec</button>
            <button class="chip" type="button" data-source="database" aria-pressed="false">Database</button>
          </div>
        </div>

        <div class="lesson-body">
          <div class="left-stack">
            <section class="panel">
              <h3>練習資料</h3>
              <div class="panel-body">
                <table class="mini-table" id="sample-table"></table>
              </div>
            </section>

            <section class="panel" style="margin-top: 14px;">
              <h3>欄位 profile</h3>
              <div class="panel-body">
                <div class="profile-bars" id="profile-bars"></div>
              </div>
            </section>

            <section class="panel" style="margin-top: 14px;">
              <h3>學習筆記</h3>
              <div class="panel-body lesson-notes">
                <div class="study-bridge" id="study-bridge" aria-label="課文轉譯"></div>
                <div class="note-grid" id="concept-grid"></div>
                <div>
                  <strong>實作步驟</strong>
                  <ol class="text-list" id="task-list"></ol>
                </div>
                <div>
                  <strong>常見錯誤</strong>
                  <ul class="text-list" id="mistake-list"></ul>
                </div>
                <div>
                  <strong>參考來源</strong>
                  <div class="reference-list" id="reference-list"></div>
                </div>
              </div>
            </section>

          </div>

          <section class="panel">
            <h3>SAS 程式工作區</h3>
            <div class="code-tools">
              <button class="button secondary" type="button" id="reset-code">還原本課程程式</button>
              <button class="button" type="button" id="compile-code">編譯檢查</button>
              <button class="button secondary" type="button" id="print-result">列印結果</button>
              <button class="button secondary" type="button" id="mark-complete">標記完成</button>
            </div>
            <textarea class="code-editor" id="sas-code" spellcheck="false"></textarea>
            <div class="run-output" id="run-output" aria-live="polite">
              <div class="run-summary">
                <span class="status-pill" id="compile-status">尚未編譯</span>
                <span id="compile-summary">等待 SAS 程式檢查。</span>
              </div>
              <div class="result-grid">
                <div class="result-pane">
                  <h4>SAS log</h4>
                  <pre class="log-lines" id="compile-log">按下「編譯檢查」後會顯示教學用 SAS log。</pre>
                </div>
                <div class="result-pane">
                  <h4>Output</h4>
                  <div class="output-table-wrap" id="print-output">
                    <p class="small-note">按下「列印結果」後會顯示本課的預期表格。</p>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    const referenceLibrary = {
      dataStep: {
        title: 'SAS Help Center: The DATA Step',
        url: 'https://documentation.sas.com/doc/en/lepg/latest/n14fu9c6l8rxbxn1nvdhlaqtsyho.htm'
      },
      import: {
        title: 'SAS Help Center: IMPORT Procedure',
        url: 'https://go.documentation.sas.com/doc/ru/pgmsascdc/9.4_3.5/proc/n1qn5sclnu2l9dn1w61ifw8wqhts.htm'
      },
      where: {
        title: 'SAS Help Center: WHERE Statement',
        url: 'https://documentation.sas.com/doc/en/pgmsascdc/v_069/lestmtsref/n1xbr9r0s9veq0n137iftzxq4g7e.htm'
      },
      ifStmt: {
        title: 'SAS Help Center: IF Statements',
        url: 'https://documentation.sas.com/doc/en/pgmsascdc/v_064/lepg/p14r1os7eztb29n1tblrzh41rsg9.htm'
      },
      freq: {
        title: 'SAS Help Center: PROC FREQ TABLES Statement',
        url: 'https://documentation.sas.com/doc/en/procstat/9.4/procstat_freq_syntax08.htm'
      },
      sort: {
        title: 'SAS Help Center: PROC SORT Examples',
        url: 'https://documentation.sas.com/doc/en/vwbproc/v_001/p0qh2iuz3fa6rpn1eib1gaxr0sb5.htm'
      },
      byGroup: {
        title: 'SAS Help Center: BY-Group Processing',

          { question: 'QC 報表最不該只包含什麼？', choices: ['漂亮表格但沒有證據命令', 'row count', 'log scan 狀態'], answer: 0, feedback: '正確。報表必須可追溯、可重跑。' }
        ]
      },
      {
        id: 'validate',
        title: '交付證據與 log 審查',
        subtitle: 'Log scan / row counts / blocker',
        objective: '把 SAS 執行結果轉成可重跑、可審查的 evidence，而不是只看畫面。',
        flow: 'Validate',
        refs: ['littleSasBook', 'littleSasExcerpt', 'dataStep', 'freq', 'sasCodeExamples', 'phuseScripts'],
        concepts: [
          ['Little SAS 對照', '閱讀 log、查看 results、理解 step boundary 是每次交付前的基本功。'],
          ['ERROR', 'SAS log 中的 ERROR 必須修正，不能只看 output table。'],
          ['WARNING', 'WARNING 可能代表 macro、format、merge、資料存取問題。'],
          ['Suspicious NOTE', '型別轉換、missing 生成、uninitialized variable 都可能讓結果錯誤。'],
          ['STOP rule', 'SAS backend、credentials 或敏感資料邊界不清楚時，不宣稱完成。']
        ],
        tasks: ['用 scan_sas_log.py 掃 SAS log。', '保存 row count、distinct key count、missing count。', '把未驗證的限制寫進交付。'],
        mistakes: ['只要沒有 ERROR 就忽略 WARNING/NOTE。', '沒有保存 log。', '沒有比較執行前後 row count。'],
        checks: ['SAS log 已用 scan_sas_log.py 掃描', 'row count 已對照', '完成邊界已寫入報告'],
        quiz: [
          { question: '看到 suspicious NOTE 時，正確處理是什麼？', choices: ['忽略 NOTE', '記錄並確認是否影響資料', '只要沒有 ERROR 就完成'], answer: 1, feedback: '正確。型別轉換、missing 生成、many-to-many merge 都可能改變結果。' },
          { question: '什麼情況不能宣稱教學 workflow 已完成 runtime 驗證？', choices: ['沒有 SAS backend 或 log', '有 PROC CONTENTS', '有 README'], answer: 0, feedback: '正確。沒有執行環境和 log，就只能說 code generation 已驗證。' }
        ]
      }
    ];

    let activeModule = modules[0].id;
    let activeSource = 'dataset';
    const completed = new Set(JSON.parse(localStorage.getItem('sasTutorCompleted') || '[]'));

    const moduleList = document.getElementById('module-list');
    const sampleTable = document.getElementById('sample-table');
    const profileBars = document.getElementById('profile-bars');
    const codeBox = document.getElementById('sas-code');
    const compileStatus = document.getElementById('compile-status');
    const compileSummary = document.getElementById('compile-summary');
    const compileLog = document.getElementById('compile-log');
    const printOutput = document.getElementById('print-output');
    let lastCompileResult = null;

    function saveProgress() {
      localStorage.setItem('sasTutorCompleted', JSON.stringify([...completed]));
      document.getElementById('progress-label').textContent = `${completed.size} / ${modules.length} 完成`;
    }

    function currentModule() {
      return modules.find((module) => module.id === activeModule) || modules[0];
    }

    function currentCode(module) {
      return (codeLibrary[module.id] && codeLibrary[module.id][activeSource]) || codeLibrary.orient[activeSource];
    }

    function currentPractice(module, source) {
      return (lessonPractice[module.id] && lessonPractice[module.id][source])
        || sourceProfiles[source];
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function stripSasComments(code) {
      return code
        .replace(/\/\*[\s\S]*?\*\//g, '')
        .replace(/^\s*\*[^;]*;\s*$/gm, '');
    }

    function countMatches(text, regex) {
      return (text.match(regex) || []).length;
    }

    function compileSasCode(code, module) {
      const clean = stripSasComments(code);
      const lower = clean.toLowerCase();
      const issues = [];
      const warnings = [];
      const notes = [];

      if (!clean.trim()) {
        issues.push('程式是空的，SAS session 沒有可提交的 statement。');
      }
      if (/[；]/.test(code)) {
        issues.push('偵測到全形分號「；」。SAS statement terminator 必須使用半形分號「;」。');
      }
      if (/[“”‘’]/.test(code)) {
        issues.push('偵測到智慧引號。SAS 字串建議使用一般單引號或雙引號。');
      }
      if (!/;\s*$/.test(clean.trim())) {
        issues.push('最後一個 SAS statement 沒有以半形分號結尾。');
      }
      if (!/\b(run|quit)\s*;/i.test(clean)) {
        issues.push('未偵測到 RUN; 或 QUIT;。DATA step 與多數 PROC step 需要明確結束。');
      }

      const procSqlCount = countMatches(lower, /\bproc\s+sql\b/g);
      const quitCount = countMatches(lower, /\bquit\s*;/g);
      if (procSqlCount > quitCount) {
        issues.push('PROC SQL step 應以 QUIT; 結束，不能只依賴 RUN;。');
      }

      if (/\bproc\s+import\b/i.test(clean)) {
        if (!/\bout\s*=/i.test(clean)) issues.push('PROC IMPORT 需要 OUT= 指定輸出的 SAS data set。');
        if (!/\bdbms\s*=/i.test(clean)) warnings.push('PROC IMPORT 建議明確指定 DBMS=，避免來源格式判斷不清。');
      }
      if (/\bproc\s+sort\b/i.test(clean) && !/\bby\s+[^;]+;/i.test(clean)) {
        issues.push('PROC SORT 需要 BY statement 才能定義排序 key。');
      }
      if (/\b(first|last)\.[a-z_][a-z0-9_]*/i.test(clean)) {
        if (!/\bby\s+[^;]+;/i.test(clean)) issues.push('使用 FIRST./LAST. 前需要 DATA step BY statement。');
        if (!/\bproc\s+sort\b/i.test(clean)) warnings.push('FIRST./LAST. 依賴 BY group；若資料未預先排序，結果可能錯誤。');
      }
      if (/\bproc\s+freq\b/i.test(clean) && !/\btables\s+[^;]+;/i.test(clean)) {
        issues.push('PROC FREQ 需要 TABLES statement 指定要摘要的欄位。');
      }
      if (/\bproc\s+means\b/i.test(clean) && !/\bvar\s+[^;]+;/i.test(clean)) {
        warnings.push('PROC MEANS 建議明確 VAR 欄位，避免把不該摘要的 numeric 欄位一起納入。');
      }
      if (/\bproc\s+contents\b/i.test(clean) && !/\bdata\s*=/i.test(clean)) {
        issues.push('PROC CONTENTS 需要 DATA= 指定要檢查的資料集。');
      }
      if (/\bproc\s+report\b/i.test(clean) && !/\bcolumn\s+[^;]+;/i.test(clean)) {
        warnings.push('PROC REPORT 建議明確 COLUMN statement，報表欄位才可審查。');
      }
      if (/\bselect\s+\*/i.test(clean) && !/\b(outobs|where)\b/i.test(clean)) {
        warnings.push('SELECT * 應搭配 OUTOBS= 或 WHERE 做 bounded sample，尤其是 database 入口。');
      }

      if (issues.length === 0) {
        notes.push('NOTE: 教學編譯檢查完成。未偵測到會阻擋 SAS step 結束的語法問題。');
        notes.push(`NOTE: Current lesson=${module.title}; source=${activeSource}.`);
        notes.push('NOTE: 這是靜態教學檢查，不等同於 SAS 9.4/OnDemand/Viya runtime execution。');
      }

      const logLines = [
        ...issues.map((issue) => `ERROR: ${issue}`),
        ...warnings.map((warning) => `WARNING: ${warning}`),
        ...notes
      ];
      return {
        ok: issues.length === 0,
        hasWarnings: warnings.length > 0,
        issues,
        warnings,
        log: logLines.join('\n')
      };
    }

    function expectedOutput(module, source) {
      const profile = currentPractice(module, source);
      if (module.id === 'summarize') {
        return {
          title: source === 'spec' ? 'PROC FREQ type/required' : 'QC Summary',
          headers: source === 'spec' ? ['type', 'required', 'count'] : ['group', 'n', 'missing_score', 'mean_score'],
          rows: source === 'spec' ? [['char', 'Y', 2], ['date', 'Y', 1], ['num', 'N', 1]] : [['A', 2, 0, 13.85], ['B', 1, 1, '.'], ['C', 1, 0, 18.9]],
          note: '摘要結果用來檢查資料分布與 missing，不是正式統計結論。'
        };
      }
      if (module.id === 'sortBy') {
        return {
          title: 'FIRST./LAST. BY-group output',
          headers: ['subject_id', 'visit_dt', 'selected_row', 'dupout_rows'],
          rows: [['S001', '2026-01-02', 'first.subject_id=1', 0], ['S002', '2026-01-03', 'first.subject_id=1', 0], ['S003', '2026-01-04', 'first.subject_id=1', 0]],
          note: 'BY group 結果依排序 key 產生；若 key grain 改變，這張表也應改變。'
        };
      }
      if (module.id === 'sql') {
        return {
          title: source === 'database' ? 'Joined bounded sample' : 'Subject summary',
          headers: source === 'database' ? ['subject_id', 'visit_date', 'score', 'site_name'] : ['subject_id', 'group', 'visit_count', 'mean_score'],
          rows: source === 'database' ? [['S001', '2026-01-02', 12.5, 'North'], ['S002', '2026-01-03', '.', 'North'], ['S003', '2026-01-04', 15.2, 'South']] : [['S001', 'A', 1, 12.5], ['S002', 'B', 1, '.'], ['S003', 'A', 1, 15.2]],
          note: 'Join 或 group by 前後要保存 row count，避免 key grain 錯誤。'
        };
      }
      if (module.id === 'transform') {
        return {
          title: 'work.analysis_ready',
          headers: ['subject_id', 'visit_dt', 'age_group', 'qc_missing_score'],
          rows: [['S001', '2026-01-02', 'LT40', 0], ['S002', '2026-01-03', 'GE40', 1], ['S003', '2026-01-04', 'LT40', 0]],
          note: '日期應是 SAS date 並用 FORMAT 顯示；missing flag 應再用 PROC FREQ 檢查。'
        };
      }
      if (module.id === 'clinical') {
        return {
          title: 'DM-like derived table',
          headers: ['studyid', 'usubjid', 'site_id', 'group', 'age'],
          rows: [['TRAINING', 'TRAINING-S001', 101, 'A', 34], ['TRAINING', 'TRAINING-S002', 101, 'B', 41], ['TRAINING', 'TRAINING-S003', 102, 'A', 29]],
          note: '這只是 SDTM-style thinking，不代表已符合 CDISC submission。'
        };
      }
      if (module.id === 'biostats') {
        return {
          title: 'Protocol/SAP/TLF trace matrix',
          headers: ['source_doc', 'stat_decision', 'programming_impact', 'qc_evidence'],
          rows: [
            ['Protocol', 'endpoint definition', 'derive endpoint flag', 'endpoint trace table'],
            ['SAP', 'estimand strategy', 'ADaM derivation rule', 'analysis rule matrix'],
            ['TLF shell', 'row/column/footnote', 'PROC REPORT layout', 'shell-to-output check']
          ],
          note: 'Biostatistics learning is converted into traceable SAS programming decisions, not copied as study guidance.'
        };
      }
      if (module.id === 'report') {
        return {
          title: 'ODS delivery',
          headers: ['file', 'table', 'status'],
          rows: [['reports/qc_summary.html', 'QC Summary by Treatment Group', 'created'], ['SAS log', 'ERROR/WARNING scan', 'required']],
          note: '報表交付應附程式、log scan 與資料限制。'
        };
      }
      if (module.id === 'validate') {
        return {
          title: 'Evidence counts',
          headers: ['metric', 'value'],
          rows: [['rows', 4], ['distinct_subjects', 4], ['missing_score', 1], ['log_errors', 0]],
          note: '沒有真實 SAS log 時，只能宣稱教學檢查通過，不能宣稱 runtime 驗證完成。'
        };
      }
      return {
        title: `${profile.label} sample`,
        headers: profile.table.headers,
        rows: profile.table.rows,
        note: module.id === 'inspect' ? '這張表代表 PROC CONTENTS/PROC PRINT 後應人工審查的重點。' : '練習資料提供目前課程的最小輸入樣本。'
      };
    }

    function renderOutputTable(result) {
      const header = `<thead><tr>${result.headers.map((head) => `<th>${escapeHtml(head)}</th>`).join('')}</tr></thead>`;
      const rows = result.rows.map((row) => `<tr>${row.map((cell) => `<td>${cell === '' ? '<span class="muted">missing</span>' : escapeHtml(cell)}</td>`).join('')}</tr>`).join('');
      return `<strong>${escapeHtml(result.title)}</strong>
        <div class="output-table-wrap">
          <table class="output-table">${header}<tbody>${rows}</tbody></table>
        </div>
        <p class="small-note">${escapeHtml(result.note)}</p>`;
    }

    function setCompileResult(result) {
      compileStatus.className = `status-pill ${result.ok ? (result.hasWarnings ? 'warn' : 'ok') : 'fail'}`;
      compileStatus.textContent = result.ok ? (result.hasWarnings ? '可執行但需審查' : '編譯檢查通過') : '編譯檢查未通過';
      compileSummary.textContent = result.ok
        ? '靜態 SAS 原則檢查完成，可列印本課預期結果。'
        : '請先修正 SAS log 中的 ERROR。';
      compileLog.textContent = result.log;
    }

    function resetRunOutput() {
      lastCompileResult = null;
      compileStatus.className = 'status-pill';
      compileStatus.textContent = '尚未編譯';
      compileSummary.textContent = '等待 SAS 程式檢查。';
      compileLog.textContent = '按下「編譯檢查」後會顯示教學用 SAS log。';
      printOutput.innerHTML = '<p class="small-note">按下「列印結果」後會顯示本課的預期表格。</p>';
    }

    function renderModules() {
      moduleList.innerHTML = modules.map((module, index) => {
        const done = completed.has(module.id) ? '完成' : module.subtitle;
        return `<button class="module-button" type="button" data-module="${module.id}" aria-current="${module.id === activeModule}">
          <span class="step-index">${index + 1}</span>
          <span><span class="module-title">${module.title}</span><span class="module-subtitle">${done}</span></span>
        </button>`;
      }).join('');
    }

    function renderTable(profile) {
      const header = `<thead><tr>${profile.table.headers.map((head) => `<th>${escapeHtml(head)}</th>`).join('')}</tr></thead>`;
      const rows = profile.table.rows.map((row) => `<tr>${row.map((cell) => `<td>${cell ? escapeHtml(cell) : '<span class="muted">missing</span>'}</td>`).join('')}</tr>`).join('');
      sampleTable.innerHTML = `${header}<tbody>${rows}</tbody>`;
    }

    function renderBars(profile) {
      profileBars.innerHTML = profile.profiles.map(([name, role]) => `<div class="bar-row">
        <span>${escapeHtml(name)}</span>
        <strong>${escapeHtml(role)}</strong>
      </div>`).join('');
    }

    function bridgeForModule(module) {
      const concept = module.concepts[0] || ['課文焦點', module.objective];
      return {
        reading: concept[1],
        action: module.tasks[0] || module.objective,
        evidence: module.checks[0] || '完成後保留可審查 evidence'
      };
    }

    function renderLessonNotes(module) {
      const bridge = bridgeForModule(module);
      document.getElementById('study-bridge').innerHTML = `
        <div class="bridge-card">
          <span>課文焦點</span>
          <p>${escapeHtml(bridge.reading)}</p>
        </div>
        <div class="bridge-card">
          <span>SAS 行動</span>
          <p>${escapeHtml(bridge.action)}</p>
        </div>
        <div class="bridge-card">
          <span>QC 證據</span>
          <p>${escapeHtml(bridge.evidence)}</p>
        </div>`;
      document.getElementById('concept-grid').innerHTML = module.concepts.map(([title, text]) => `<div class="note-box">
        <strong>${escapeHtml(title)}</strong>
        <p>${escapeHtml(text)}</p>
      </div>`).join('');
      document.getElementById('task-list').innerHTML = module.tasks.map((task) => `<li>${escapeHtml(task)}</li>`).join('');
      document.getElementById('mistake-list').innerHTML = module.mistakes.map((mistake) => `<li>${escapeHtml(mistake)}</li>`).join('');
      document.getElementById('reference-list').innerHTML = module.refs
        .map((key) => referenceLibrary[key])
        .filter(Boolean)
        .map((ref) => `<a href="${escapeHtml(ref.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(ref.title)}</a>`)
        .join('');
    }

    function render() {
      const module = currentModule();
      const sourceMeta = sourceProfiles[activeSource];
      const profile = currentPractice(module, activeSource);
      document.getElementById('lesson-title').textContent = module.title;
      document.getElementById('lesson-objective').textContent = module.objective;
      document.getElementById('source-pill').textContent = sourceMeta.label;
      codeBox.value = currentCode(module);
      renderModules();
      renderTable(profile);
      renderBars(profile);
      renderLessonNotes(module);
      resetRunOutput();
      saveProgress();
      document.querySelectorAll('.chip').forEach((chip) => {
        chip.setAttribute('aria-pressed', String(chip.dataset.source === activeSource));
      });
    }

    moduleList.addEventListener('click', (event) => {
      const button = event.target.closest('[data-module]');
      if (!button) return;
      activeModule = button.dataset.module;
      render();
    });

    document.querySelector('.source-switcher').addEventListener('click', (event) => {
      const button = event.target.closest('[data-source]');
      if (!button) return;
      activeSource = button.dataset.source;
      render();
    });

    document.getElementById('mark-complete').addEventListener('click', () => {
      completed.add(activeModule);
      saveProgress();
      renderModules();
    });

    document.getElementById('reset-progress').addEventListener('click', () => {
      completed.clear();
      localStorage.removeItem('sasTutorCompleted');
      render();
    });

    document.getElementById('reset-code').addEventListener('click', () => {
      codeBox.value = currentCode(currentModule());
      resetRunOutput();
    });

    codeBox.addEventListener('input', () => {
      lastCompileResult = null;
      compileStatus.className = 'status-pill warn';
      compileStatus.textContent = '程式已修改';
      compileSummary.textContent = '請重新執行編譯檢查。';
    });

    document.getElementById('compile-code').addEventListener('click', () => {
      lastCompileResult = compileSasCode(codeBox.value, currentModule());
      setCompileResult(lastCompileResult);
      if (!lastCompileResult.ok) {
        printOutput.innerHTML = '<p class="small-note">編譯檢查未通過，暫不列印預期結果。</p>';
      }
    });

    document.getElementById('print-result').addEventListener('click', () => {
      if (!lastCompileResult) {
        lastCompileResult = compileSasCode(codeBox.value, currentModule());
        setCompileResult(lastCompileResult);
      }
      if (!lastCompileResult.ok) {
        printOutput.innerHTML = '<p class="small-note">請先修正 SAS log 中的 ERROR，再列印結果。</p>';
        return;
      }
      printOutput.innerHTML = renderOutputTable(expectedOutput(currentModule(), activeSource));
    });

    document.getElementById('copy-code').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(codeBox.value);
        document.getElementById('copy-code').textContent = '已複製';
        setTimeout(() => {
          document.getElementById('copy-code').textContent = '複製程式';
        }, 1400);
      } catch (_error) {
        codeBox.focus();
        codeBox.select();
      }
    });

    render();
  </script>
</body>
</html>
